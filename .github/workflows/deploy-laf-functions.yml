name: Deploy Laf Functions

on:
  push:
    branches:
      - main
    paths:
      - apps/laf-functions/paperbanana-api.ts
      - .github/workflows/deploy-laf-functions.yml
  workflow_dispatch:
    inputs:
      function_name:
        description: Laf function name to deploy.
        required: true
        default: paperbanana-api
      source_file:
        description: Source file path in this repository.
        required: true
        default: apps/laf-functions/paperbanana-api.ts

permissions:
  contents: read

concurrency:
  group: laf-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LAF_APPID: ${{ secrets.LAF_APPID }}
      LAF_PAT: ${{ secrets.LAF_PAT }}
      LAF_SERVER: ${{ secrets.LAF_SERVER }}
      FUNCTION_NAME: ${{ inputs.function_name || 'paperbanana-api' }}
      SOURCE_FILE: ${{ inputs.source_file || 'apps/laf-functions/paperbanana-api.ts' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate required secrets and source file
        run: |
          test -n "$LAF_APPID" || (echo "Missing GitHub secret: LAF_APPID" && exit 1)
          test -n "$LAF_PAT" || (echo "Missing GitHub secret: LAF_PAT" && exit 1)
          test -f "$SOURCE_FILE" || (echo "Missing source file: $SOURCE_FILE" && exit 1)

      - name: Install Laf CLI
        run: npm install -g laf-cli@1.0.0-patch.0

      - name: Deploy function
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          cp "$SOURCE_FILE" "$workdir/source.ts"
          cd "$workdir"

          laf_server="${LAF_SERVER:-https://api.laf.run}"
          laf user add ci -r "$laf_server"
          laf user switch ci
          laf login "$LAF_PAT"

          laf app init "$LAF_APPID"

          mkdir -p functions
          cp "$workdir/source.ts" "functions/${FUNCTION_NAME}.ts"
          cat > "functions/${FUNCTION_NAME}.yaml" <<YAML
          name: ${FUNCTION_NAME}
          desc: PaperBanana API
          methods:
            - GET
            - POST
          tags: []
          YAML

          laf func push "$FUNCTION_NAME"
