name: Release Windows Desktop

on:
  push:
    tags:
      - desktop-v*
  workflow_dispatch:
    inputs:
      version:
        description: Desktop package version to release, for example 0.1.2.
        required: true

permissions:
  contents: write

concurrency:
  group: windows-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    env:
      PAPERBANANA_DESKTOP_URL: https://paperbanana.asia/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#desktop-v}"
          else
            version="${{ inputs.version }}"
            tag="desktop-v${version}"
          fi

          node -e "const pkg = require('./apps/desktop/package.json'); if (pkg.version !== '${version}') { console.error('apps/desktop/package.json version ' + pkg.version + ' does not match release version ${version}'); process.exit(1); }"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install desktop dependencies
        run: pnpm install --filter @paperbanana/desktop... --frozen-lockfile

      - name: Check desktop entrypoint
        run: pnpm --filter @paperbanana/desktop check

      - name: Build Windows installer
        run: pnpm --filter @paperbanana/desktop build:win

      - name: Build Windows portable executable
        run: pnpm --filter @paperbanana/desktop build:win:portable

      - name: List Windows artifacts
        shell: pwsh
        run: Get-ChildItem apps/desktop/release -File | Select-Object Name, Length

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paperbanana-windows-${{ steps.release.outputs.version }}
          path: |
            apps/desktop/release/PaperBanana-Setup-${{ steps.release.outputs.version }}.exe
            apps/desktop/release/PaperBanana-Setup-${{ steps.release.outputs.version }}.exe.blockmap
            apps/desktop/release/PaperBanana-Portable-${{ steps.release.outputs.version }}.exe
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: PaperBanana Windows ${{ steps.release.outputs.version }}
          make_latest: true
          files: |
            apps/desktop/release/PaperBanana-Setup-${{ steps.release.outputs.version }}.exe
            apps/desktop/release/PaperBanana-Setup-${{ steps.release.outputs.version }}.exe.blockmap
            apps/desktop/release/PaperBanana-Portable-${{ steps.release.outputs.version }}.exe
          body: |
            PaperBanana Windows 桌面端。

            - 安装版：`PaperBanana-Setup-${{ steps.release.outputs.version }}.exe`
            - 免安装版：`PaperBanana-Portable-${{ steps.release.outputs.version }}.exe`
            - 默认加载：https://paperbanana.asia/
