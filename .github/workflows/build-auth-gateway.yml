name: Build Auth Gateway Image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-auth-gateway.yml
      - apps/auth-gateway/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: auth-gateway-image
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/paperbanana-auth-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/auth-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Roll out to Sealos
        env:
          KUBECONFIG_DATA: ${{ secrets.SEALOS_KUBECONFIG }}
          DEPLOYMENT: paperbanana-auth-gateway
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          container="$(kubectl get deployment "$DEPLOYMENT" -o jsonpath='{.spec.template.spec.containers[0].name}')"
          kubectl set image "deployment/$DEPLOYMENT" "$container=$IMAGE_REF"
          kubectl rollout status "deployment/$DEPLOYMENT" --timeout=180s
