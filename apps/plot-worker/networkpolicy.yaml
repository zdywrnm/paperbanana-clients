# networkpolicy.yaml — plot-worker network boundary (BOUNDARY LAYER #2).
#
# The plot-worker runs UNTRUSTED, LLM-generated matplotlib code. We assume that
# code may fully escape the in-process Python sandbox and reach a real socket.
# This NetworkPolicy is what then stops it from doing anything with that socket:
# it DENIES ALL EGRESS from the pod, so escaped code cannot phone home, exfiltrate
# data, hit cloud metadata (169.254.169.254), or pivot to internal services.
#
# The worker only needs INBOUND HTTP from its trusted caller (the auth-gateway /
# Laf cloud function). It never needs to originate a connection itself.
#
# IMPORTANT:
#   * NetworkPolicy is enforced only if the cluster CNI supports it (Cilium,
#     Calico, etc.). On a CNI without NetworkPolicy support this file is a no-op
#     and the egress boundary is NOT present — verify your CNI before relying on
#     it. This is part of why the secret-free child env (layer #1) exists: even
#     with no egress control, there is no secret in the child to steal.
#   * A default-deny policy needs the DNS carve-out below ONLY if the worker must
#     resolve names for its OWN inbound serving; pure inbound HTTP does not need
#     egress DNS, so DNS egress is left DENIED by default. Re-add it only if a
#     concrete need appears — fewer allowances = smaller blast radius.
#   * Adjust namespace + podSelector/labels and the ingress source selector to
#     match your actual deployment (see README "Deploy checklist").
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: plot-worker-deny-egress
  labels:
    app: plot-worker
spec:
  # Select the plot-worker pods. Make the deployment set these labels.
  podSelector:
    matchLabels:
      app: plot-worker
  policyTypes:
    - Ingress
    - Egress

  # EGRESS: empty list = deny ALL outbound traffic from the pod. The worker
  # must not reach the internet, internal services, or cloud metadata.
  egress: []

  # INGRESS: allow ONLY the trusted caller to reach the worker's HTTP port.
  # Tighten `from` to your gateway/Laf pods. If the caller is outside the
  # cluster (e.g. Sealaf), front this with an Ingress/Service whose pods carry
  # the label below, or replace the selector with the appropriate source.
  ingress:
    - from:
        # Allow any pod in the SAME namespace to reach the worker's HTTP port.
        # The Laf cloud function (sealaf runtime) calls the worker DIRECTLY, so a
        # narrow `app: auth-gateway` selector would block it. The worker is
        # internal-only (egress denied), so same-namespace inbound is the boundary.
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000
